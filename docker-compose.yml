services:
  postgres:
    image: postgres:16-alpine
    container_name: naxis-postgres
    environment:
      POSTGRES_DB: naxis
      POSTGRES_USER: naxis
      POSTGRES_PASSWORD: naxis_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schemas/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U naxis -d naxis"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - naxis-net

  redis:
    image: redis:7-alpine
    container_name: naxis-redis
    command: redis-server --requirepass "${REDIS_PASSWORD}"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - naxis-net

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: production
    image: naxis-backend
    container_name: naxis-worker
    command: python -u -m worker.main
    env_file: .env
    environment:
      SERVICE_NAME: naxis-worker
      LOG_LEVEL: INFO
      PYTHONPATH: /app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - naxis-net
    deploy:
      resources:
        limits:
          memory: 1G

  api:
    image: naxis-backend
    container_name: naxis-api
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 2
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      SERVICE_NAME: naxis-api
      LOG_LEVEL: INFO
      PYTHONPATH: /app
    depends_on:
      postgres:
        condition: service_healthy
      worker:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - naxis-net
    deploy:
      resources:
        limits:
          memory: 512M

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_PUBLIC_API_KEY: 14fc7a8b6c6b608652192b2f68cc1dfa12a3bfe559651c0fe9092843c3c9573f
    container_name: naxis-web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_API_KEY: 14fc7a8b6c6b608652192b2f68cc1dfa12a3bfe559651c0fe9092843c3c9573f
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - naxis-net
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  postgres_data:
    name: naxis_postgres_data
  redis_data:
    name: naxis_redis_data

networks:
  naxis-net:
    name: naxis-net
    driver: bridge
