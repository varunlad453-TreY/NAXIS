version: '3.8'

services:
  # Infrastructure Services
  postgres:
    image: postgres:16-alpine
    container_name: naxis-postgres
    environment:
      POSTGRES_USER: naxis
      POSTGRES_PASSWORD: naxis_dev
      POSTGRES_DB: naxis
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U naxis -d naxis"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - naxis-net

  redis:
    image: redis:7-alpine
    container_name: naxis-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - naxis-net

  # Application Services
  worker:
    build:
      context: .
      dockerfile: backend/worker/Dockerfile
    container_name: naxis-worker
    env_file: .env
    environment:
      SERVICE_NAME: naxis-worker
      LOG_LEVEL: INFO
      STORAGE_MODE: postgres
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: naxis
      POSTGRES_PASSWORD: naxis_dev
      POSTGRES_DATABASE: naxis
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - naxis-net
    deploy:
      resources:
        limits:
          memory: 2G

  api:
    build:
      context: .
      dockerfile: backend/api/Dockerfile
    container_name: naxis-api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      SERVICE_NAME: naxis-api
      LOG_LEVEL: INFO
      STORAGE_MODE: postgres
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: naxis
      POSTGRES_PASSWORD: naxis_dev
      POSTGRES_DATABASE: naxis
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      - naxis-net
    deploy:
      resources:
        limits:
          memory: 1G

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: naxis-web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - naxis-net
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  postgres_data:
    name: naxis_postgres_data
  redis_data:
    name: naxis_redis_data

networks:
  naxis-net:
    name: naxis-net
    driver: bridge
